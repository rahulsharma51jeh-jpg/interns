services:
  postgres:
    image: postgres:16-alpine
    container_name: infinity-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: infinity
      POSTGRES_PASSWORD: infinity
      POSTGRES_DB: infinity_interns
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infinity -d infinity_interns"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: infinity-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO is an S3-compatible store for local dev (stands in for AWS S3 / R2)
  minio:
    image: minio/minio:latest
    container_name: infinity-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: infinity
      MINIO_ROOT_PASSWORD: infinity123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # MailHog captures outgoing email during local dev
  mailhog:
    image: mailhog/mailhog:latest
    container_name: infinity-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
  redisdata:
  miniodata:
