<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Infinity Interns™ — Engineering Internship Platform</title>
<meta name="description" content="Discover, apply, complete and earn verified internships across 30+ engineering branches and 35+ domains. Single-file demo app." />
<style>
/* ─────────────────────────────────────────────────────────────
   Design tokens (light + dark)
   ───────────────────────────────────────────────────────────── */
:root{
  --bg:#ffffff; --fg:#0f172a; --card:#ffffff; --card-fg:#0f172a;
  --muted:#f1f5f9; --muted-fg:#64748b; --border:#e2e8f0; --input:#e2e8f0;
  --primary:#6d4aff; --primary-fg:#ffffff; --accent:#a78bfa; --ring:#6d4aff;
  --secondary:#f1f5f9; --secondary-fg:#0f172a;
  --success:#10b981; --warning:#f59e0b; --danger:#ef4444;
  --radius:14px; --shadow:0 10px 30px -12px rgba(2,6,23,.25);
  --header-h:64px;
}
html[data-theme="dark"]{
  --bg:#070b18; --fg:#e8edf7; --card:#0e1426; --card-fg:#e8edf7;
  --muted:#131b30; --muted-fg:#93a1bd; --border:#1e2942; --input:#1e2942;
  --primary:#8b6dff; --primary-fg:#07091a; --accent:#7c5cff; --ring:#8b6dff;
  --secondary:#16203a; --secondary-fg:#e8edf7;
  --shadow:0 18px 50px -18px rgba(0,0,0,.7);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--fg);
  font-family:'Inter',system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  line-height:1.55; -webkit-font-smoothing:antialiased;
}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{margin:0;line-height:1.2;letter-spacing:-.02em}
p{margin:0}
img{max-width:100%}
button{font-family:inherit;cursor:pointer}
.container{width:100%;max-width:1180px;margin:0 auto;padding:0 20px}
.muted{color:var(--muted-fg)}
.center{text-align:center}
.gradient-text{background:linear-gradient(120deg,var(--primary),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hidden{display:none !important}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}

/* Layout helpers */
.flex{display:flex} .between{justify-content:space-between} .items-center{align-items:center}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}.gap24{gap:24px}
.wrap{flex-wrap:wrap}.col{flex-direction:column}
.grid{display:grid;gap:20px}
.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt24{margin-top:24px}.mt32{margin-top:32px}.mt40{margin-top:40px}
.mb8{margin-bottom:8px}.mb16{margin-bottom:16px}.mb24{margin-bottom:24px}
.fill{flex:1}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.hide-sm{display:none}}
@media(max-width:560px){.g4{grid-template-columns:1fr}}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:0;border-radius:10px;
  background:var(--primary);color:var(--primary-fg);font-weight:600;font-size:14px;padding:10px 18px;transition:.15s;white-space:nowrap}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.lg{padding:14px 26px;font-size:16px}
.btn.sm{padding:7px 13px;font-size:13px}
.btn.outline{background:transparent;color:var(--fg);border:1px solid var(--border)}
.btn.outline:hover{background:var(--muted)}
.btn.ghost{background:transparent;color:var(--fg)}
.btn.ghost:hover{background:var(--muted)}
.btn.danger{background:var(--danger);color:#fff}
.btn.success{background:var(--success);color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-icon{width:40px;height:40px;padding:0;border-radius:10px}

/* Cards */
.card{background:var(--card);color:var(--card-fg);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:22px}
.card.hover{transition:.18s}
.card.hover:hover{transform:translateY(-3px);border-color:var(--primary)}

/* Badges & chips */
.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 11px;font-size:12px;font-weight:600;
  background:color-mix(in srgb,var(--primary) 14%,transparent);color:var(--primary)}
.badge.gray{background:var(--muted);color:var(--muted-fg)}
.badge.success{background:color-mix(in srgb,var(--success) 16%,transparent);color:var(--success)}
.badge.warning{background:color-mix(in srgb,var(--warning) 18%,transparent);color:var(--warning)}
.badge.danger{background:color-mix(in srgb,var(--danger) 16%,transparent);color:var(--danger)}
.badge.outline{background:transparent;border:1px solid var(--border);color:var(--fg)}
.chip{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:13px;background:var(--card);transition:.15s;cursor:pointer}
.chip:hover{border-color:var(--primary);color:var(--primary)}
.chip.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary)}

/* Inputs */
label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
.input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--input);border-radius:10px;
  padding:10px 12px;color:var(--fg);font-size:14px;font-family:inherit;outline:none;transition:.15s}
.input:focus,select:focus,textarea:focus{border-color:var(--ring);box-shadow:0 0 0 3px color-mix(in srgb,var(--ring) 25%,transparent)}
textarea{resize:vertical;min-height:84px}
.field{margin-bottom:14px}

/* Header */
header.site{position:sticky;top:0;z-index:50;height:var(--header-h);display:flex;align-items:center;
  border-bottom:1px solid var(--border);background:color-mix(in srgb,var(--bg) 80%,transparent);backdrop-filter:blur(12px)}
.logo{display:flex;align-items:center;gap:9px;font-weight:800;font-size:18px}
.logo .mark{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(135deg,var(--primary),var(--accent));color:#fff;font-size:18px}
nav.main{display:flex;gap:22px}
nav.main a{font-size:14px;font-weight:500;color:var(--muted-fg)}
nav.main a:hover,nav.main a.active{color:var(--fg)}
@media(max-width:820px){nav.main{display:none}}

/* Hero */
.hero{position:relative;overflow:hidden;padding:92px 0 76px;text-align:center}
.hero .grid-bg{position:absolute;inset:0;background-image:
  linear-gradient(color-mix(in srgb,var(--border) 60%,transparent) 1px,transparent 1px),
  linear-gradient(90deg,color-mix(in srgb,var(--border) 60%,transparent) 1px,transparent 1px);
  background-size:42px 42px;mask-image:radial-gradient(ellipse at center,#000,transparent 72%);opacity:.6}
.hero h1{font-size:clamp(34px,5.5vw,62px);font-weight:850;max-width:880px;margin:0 auto}
.hero p.sub{font-size:18px;max-width:640px;margin:18px auto 0;color:var(--muted-fg)}
.glow{position:absolute;border-radius:50%;filter:blur(90px);opacity:.4;z-index:-1}

/* Sections */
section.block{padding:74px 0}
section.alt{background:var(--muted)}
.section-head{max-width:620px;margin:0 auto 44px;text-align:center}
.section-head h2{font-size:clamp(26px,3.5vw,38px);font-weight:800}
.section-head p{margin-top:12px;color:var(--muted-fg)}

/* Stat */
.stat .num{font-size:34px;font-weight:850}
.stat .lbl{color:var(--muted-fg);font-size:14px;margin-top:2px}

/* feature icon */
.ficon{width:46px;height:46px;border-radius:11px;display:grid;place-items:center;font-size:22px;
  background:color-mix(in srgb,var(--primary) 14%,transparent);color:var(--primary);margin-bottom:14px}

/* progress */
.progress{height:10px;border-radius:999px;background:var(--muted);overflow:hidden}
.progress > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--primary),var(--accent))}

/* table */
table.tbl{width:100%;border-collapse:collapse;font-size:14px}
table.tbl th,table.tbl td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--border)}
table.tbl th{color:var(--muted-fg);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
table.tbl tr:hover td{background:var(--muted)}

/* tabs */
.tabs{display:flex;gap:4px;border:1px solid var(--border);border-radius:12px;padding:4px;background:var(--card);overflow:auto}
.tabs button{flex:1;border:0;background:transparent;color:var(--muted-fg);font-weight:600;font-size:14px;padding:9px 14px;border-radius:9px;white-space:nowrap}
.tabs button.active{background:var(--primary);color:var(--primary-fg)}

/* modal */
.modal-bg{position:fixed;inset:0;z-index:100;background:rgba(2,6,23,.6);backdrop-filter:blur(3px);display:grid;place-items:center;padding:18px}
.modal{width:100%;max-width:540px;max-height:90vh;overflow:auto;animation:pop .18s ease-out}
@keyframes pop{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:none}}

/* toast */
#toasts{position:fixed;right:18px;bottom:18px;z-index:200;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--card);border:1px solid var(--border);border-left:4px solid var(--primary);border-radius:10px;
  padding:12px 16px;box-shadow:var(--shadow);min-width:240px;max-width:340px;animation:pop .2s}
.toast.success{border-left-color:var(--success)} .toast.error{border-left-color:var(--danger)} .toast.warn{border-left-color:var(--warning)}

/* misc */
.divider{height:1px;background:var(--border);margin:18px 0}
.kbd{font-family:ui-monospace,monospace;background:var(--muted);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block}
.avatar{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--primary),var(--accent))}
.reveal{opacity:0;transform:translateY(14px);animation:rise .6s forwards}
@keyframes rise{to{opacity:1;transform:none}}
.timeline{position:relative;padding-left:22px}
.timeline:before{content:"";position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--border)}
.timeline .ev{position:relative;padding:0 0 16px 0}
.timeline .ev:before{content:"";position:absolute;left:-19px;top:5px;width:10px;height:10px;border-radius:50%;background:var(--primary)}
.cert{position:relative;border:2px solid var(--primary);border-radius:16px;padding:32px;background:
  radial-gradient(circle at 90% 10%,color-mix(in srgb,var(--primary) 10%,transparent),transparent 40%),var(--card)}
.cert .seal{position:absolute;top:22px;right:22px;width:74px;height:74px;border-radius:50%;display:grid;place-items:center;
  border:2px dashed var(--primary);color:var(--primary);font-size:11px;font-weight:800;text-align:center}
canvas.qr{border-radius:8px;background:#fff;padding:6px}
.notif-wrap{position:relative}
.notif-badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center}
.dropdown{position:absolute;top:48px;right:0;width:320px;max-height:400px;overflow:auto;z-index:60}
.scrollx{overflow-x:auto}
.pill-row{display:flex;flex-wrap:wrap;gap:8px}
</style>
</head>

/* ---- Pure-JS SHA-256 (offline anti-tamper hashing; no Web Crypto needed) ---- */
const SHA256=(function(){
  function rrot(n,x){return (x>>>n)|(x<<(32-n));}
  const K=[0x428a2f98,0x71374491,0xb5c0fbcf,0xe9b5dba5,0x3956c25b,0x59f111f1,0x923f82a4,0xab1c5ed5,
  0xd807aa98,0x12835b01,0x243185be,0x550c7dc3,0x72be5d74,0x80deb1fe,0x9bdc06a7,0xc19bf174,
  0xe49b69c1,0xefbe4786,0x0fc19dc6,0x240ca1cc,0x2de92c6f,0x4a7484aa,0x5cb0a9dc,0x76f988da,
  0x983e5152,0xa831c66d,0xb00327c8,0xbf597fc7,0xc6e00bf3,0xd5a79147,0x06ca6351,0x14292967,
  0x27b70a85,0x2e1b2138,0x4d2c6dfc,0x53380d13,0x650a7354,0x766a0abb,0x81c2c92e,0x92722c85,
  0xa2bfe8a1,0xa81a664b,0xc24b8b70,0xc76c51a3,0xd192e819,0xd6990624,0xf40e3585,0x106aa070,
  0x19a4c116,0x1e376c08,0x2748774c,0x34b0bcb5,0x391c0cb3,0x4ed8aa4a,0x5b9cca4f,0x682e6ff3,
  0x748f82ee,0x78a5636f,0x84c87814,0x8cc70208,0x90befffa,0xa4506ceb,0xbef9a3f7,0xc67178f2];
  return function(ascii){
    let h=[0x6a09e667,0xbb67ae85,0x3c6ef372,0xa54ff53a,0x510e527f,0x9b05688c,0x1f83d9ab,0x5be0cd19];
    // UTF-8 encode
    const utf8=unescape(encodeURIComponent(ascii));
    const words=[];const len=utf8.length;
    for(let i=0;i<len;i++) words[i>>2]|=utf8.charCodeAt(i)<<((3-(i%4))*8);
    words[len>>2]|=0x80<<((3-(len%4))*8);
    words[(((len+8)>>6)+1)*16-1]=len*8;
    for(let j=0;j<words.length;j+=16){
      const w=new Array(64);
      for(let i=0;i<16;i++)w[i]=words[j+i]|0;
      for(let i=16;i<64;i++){
        const s0=rrot(7,w[i-15])^rrot(18,w[i-15])^(w[i-15]>>>3);
        const s1=rrot(17,w[i-2])^rrot(19,w[i-2])^(w[i-2]>>>10);
        w[i]=(w[i-16]+s0+w[i-7]+s1)|0;
      }
      let [a,b,c,d,e,f,g,hh]=h;
      for(let i=0;i<64;i++){
        const S1=rrot(6,e)^rrot(11,e)^rrot(25,e);
        const ch=(e&f)^((~e)&g);
        const t1=(hh+S1+ch+K[i]+w[i])|0;
        const S0=rrot(2,a)^rrot(13,a)^rrot(22,a);
        const maj=(a&b)^(a&c)^(b&c);
        const t2=(S0+maj)|0;
        hh=g;g=f;f=e;e=(d+t1)|0;d=c;c=b;b=a;a=(t1+t2)|0;
      }
      h=[(h[0]+a)|0,(h[1]+b)|0,(h[2]+c)|0,(h[3]+d)|0,(h[4]+e)|0,(h[5]+f)|0,(h[6]+g)|0,(h[7]+hh)|0];
    }
    return h.map(x=>("00000000"+(x>>>0).toString(16)).slice(-8)).join("");
  };
})();

const $=(s,r=document)=>r.querySelector(s);
const $$=(s,r=document)=>Array.from(r.querySelectorAll(s));

function computeCompletion(s){
  const w={branch:15,college:10,gradYear:10,cgpa:10,city:5,bio:10,resumeUrl:15,githubUrl:10,linkedinUrl:10};
  let score=0;for(const k in w){if(s[k])score+=w[k];}
  if(s.skills&&s.skills.length)score=Math.min(100,score+5);
  return Math.min(100,score);
}

/* ============================================================================
   WORKFLOW ENGINE — guarded transitions + audit trail + side effects
   ========================================================================== */
const Workflow={
  can(from,to){return (TRANSITIONS[from]||[]).includes(to);},
  next(from){return TRANSITIONS[from]||[];},
  transition(appId,to,actor,note){
    const app=Store.application(appId);if(!app) throw new Error("Application not found");
    if(!this.can(app.status,to)) throw new Error(`Illegal transition ${app.status} → ${to}`);
    // actor authorization
    const isAdmin=actor.roles.includes("ADMIN");
    const ins=Store.internship(app.internshipId);
    const isOrg=actor.orgId&&ins&&ins.orgId===actor.orgId;
    const isStudent=actor.studentId&&app.studentId===actor.studentId;
    if(to==="WITHDRAWN"&&!(isStudent||isAdmin)) throw new Error("Only the applicant can withdraw");
    if(["ADMIN_REVIEW","ORG_REVIEW","COMPLETED"].includes(to)&&!isAdmin) throw new Error("Admin action required");
    if(["SHORTLISTED","UNDER_REVIEW","SELECTED","ONGOING","PERFORMANCE_EVALUATION","COMPLETION_APPROVAL"].includes(to)&&!(isOrg||isAdmin)) throw new Error("Organization action required");
    const from=app.status;app.status=to;
    app.history=app.history||[];app.history.push({from,to,note:note||"",actorId:actor.id,at:nowISO()});
    const t=nowISO();
    if(to==="SELECTED"){app.selectedAt=t;}
    if(to==="ONGOING"){app.startedAt=t;}
    if(to==="COMPLETED"){app.completedAt=t;}
    if(to==="REJECTED"){app.rejectedAt=t;app.rejectionNote=note||"";}
    // gamification side effects
    const stu=Store.student(app.studentId);
    if(stu){
      if(to==="APPLIED") Gamify.add(stu,25);
      if(to==="SELECTED") Gamify.add(stu,100);
      if(to==="ONGOING") Gamify.badge(stu,"first-internship");
      if(to==="COMPLETED") Gamify.add(stu,300);
    }
    // notifications
    const su=stu&&Store.user(stu.userId);
    if(su) notify(su.id,"Application update","Your application for “"+(ins?ins.title:"an internship")+"” is now "+titleCase(to)+".","#/dashboard");
    Store.save();return app;
  }
};

/* ============================================================================
   CERTIFICATE ENGINE — issue / verify / revoke / tamper, SHA-256 anti-tamper
   ========================================================================== */
function canonical(c){
  const o={certificateId:c.certificateId,studentName:c.studentName,organizationName:c.organizationName,
    domainName:c.domainName,title:c.title,durationWeeks:c.durationWeeks||null,grade:c.grade||null,issueDate:c.issueDate};
  return JSON.stringify(Object.keys(o).sort().reduce((a,k)=>(a[k]=o[k],a),{}));
}
const Certs={
  genId(){const y=new Date().getFullYear();const a="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
    let s="";for(let i=0;i<8;i++)s+=a[Math.floor(Math.random()*a.length)];return `INF-${y}-${s}`;},
  issue({type,studentId,applicationId,studentName,organizationName,domainName,title,durationWeeks,grade,issuedBy}){
    const c={id:uid("crt"),certificateId:this.genId(),type:type||"INTERNSHIP_COMPLETION",status:"ISSUED",
      studentId,applicationId:applicationId||null,studentName,organizationName,domainName,title,
      durationWeeks:durationWeeks||null,grade:grade||null,verificationNumber:uid("vn").replace(/[^a-z0-9]/g,"").slice(0,18),
      issueDate:nowISO(),issuedBy:issuedBy||null};
    c.contentHash=SHA256(canonical(c));
    c.signature=SHA256(c.contentHash+"|infinity-signing-key").slice(0,32); // demo digital signature
    Store.data.certificates.push(c);
    const stu=Store.student(studentId);if(stu){Gamify.badge(stu,"certified");if(!stu.certs)stu.certs=[];}
    Store.save();return c;
  },
  issueForApplication(appId,issuedBy){
    const app=Store.application(appId);if(!app) throw new Error("Application not found");
    if(app.certificateId) return Store.certificate(app.certificateId);
    if(app.status!=="COMPLETED") throw new Error("Certificate only for COMPLETED internships");
    const stu=Store.student(app.studentId),su=Store.user(stu.userId),ins=Store.internship(app.internshipId),org=Store.org(ins.orgId);
    const c=this.issue({type:"INTERNSHIP_COMPLETION",studentId:stu.id,applicationId:app.id,studentName:su.fullName,
      organizationName:org.companyName,domainName:Store.domain(ins.domain).name,title:"Internship Completion — "+ins.title,
      durationWeeks:ins.durationWeeks,grade:app.finalGrade||"A",issuedBy});
    app.certificateId=c.id;app.status="CERTIFICATE_GENERATED";
    app.history=app.history||[];app.history.push({from:"COMPLETED",to:"CERTIFICATE_GENERATED",note:"Certificate "+c.certificateId+" issued",actorId:issuedBy,at:nowISO()});
    Store.save();
    if(su) notify(su.id,"Certificate issued 🏅","Your certificate "+c.certificateId+" is ready.","#/certificates");
    return c;
  },
  verify(identifier,method){
    const id=identifier.trim();
    const c=Store.data.certificates.find(x=>x.certificateId.toLowerCase()===id.toLowerCase()||x.verificationNumber===id);
    let result;
    if(!c){result={valid:false,reason:"NOT_FOUND"};}
    else{
      const recomputed=SHA256(canonical(c));
      const tampered=recomputed!==c.contentHash;
      const revoked=c.status==="REVOKED";
      result={valid:!tampered&&!revoked,reason:revoked?"REVOKED":tampered?"TAMPERED":"OK",cert:(!tampered&&!revoked)?c:null};
    }
    Store.data.verifications.push({id:uid("ver"),certId:c?c.id:null,identifier:id,method:method||"ID",valid:result.valid,at:nowISO()});
    Store.save();return result;
  },
  revoke(id,reason){const c=Store.certificate(id);if(!c)throw new Error("Not found");c.status="REVOKED";c.revokeReason=reason;c.revokedAt=nowISO();Store.save();return c;},
  // demo helper: mutate a display field WITHOUT updating the hash -> verification detects tampering
  simulateTamper(id){const c=Store.certificate(id);if(!c)throw new Error("Not found");c.studentName=c.studentName+" (edited)";Store.save();return c;}
};

/* ============================================================================
   AI MOCKS — resume ATS analyzer, recommender, skill assessment
   ========================================================================== */
const AI={
  analyzeResume(stu,targetDomain){
    let score=20;
    if(stu.resumeUrl)score+=20; if(stu.githubUrl)score+=12; if(stu.linkedinUrl)score+=8;
    if(stu.bio&&stu.bio.length>40)score+=10; if(stu.cgpa)score+=8; if(stu.college)score+=6;
    score+=Math.min(16,(stu.skills||[]).length*3);
    score=Math.min(98,score);
    // skill gap vs a domain's "expected" skills (heuristic)
    const expected=(DOMAIN_SKILLS[targetDomain]||["Git","Communication","Problem Solving"]);
    const have=new Set((stu.skills||[]));
    const gaps=expected.filter(s=>!have.has(s));
    const suggestions=[];
    if(!stu.resumeUrl)suggestions.push("Upload a resume link to boost ATS parsing.");
    if(!stu.githubUrl)suggestions.push("Add a GitHub profile with 2–3 pinned projects.");
    if((stu.skills||[]).length<5)suggestions.push("List at least 5 relevant skills.");
    if(gaps.length)suggestions.push("Close skill gaps: "+gaps.slice(0,4).join(", ")+".");
    if(!stu.bio||stu.bio.length<40)suggestions.push("Write a 2-line summary highlighting your strengths.");
    if(!suggestions.length)suggestions.push("Great profile! Apply to 3 stretch roles this week.");
    return {atsScore:score,gaps,suggestions};
  },
  recommend(stu){
    const open=Store.data.internships.filter(i=>i.status==="OPEN");
    const have=new Set(stu.skills||[]);
    return open.map(i=>{
      let s=0;if(i.branch===stu.branch)s+=3;
      const req=DOMAIN_SKILLS[i.domain]||[];req.forEach(r=>{if(have.has(r))s+=1;});
      return {i,s};
    }).sort((a,b)=>b.s-a.s).slice(0,6).map(x=>x.i);
  }
};

/* QR-like verification code rendered deterministically from the content (offline). */
function drawQR(canvas,text){
  const n=29,size=canvas.width,m=size/n,ctx=canvas.getContext("2d");
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,size,size);ctx.fillStyle="#0b1020";
  let bits="",seed=text;
  while(bits.length<n*n){const hsh=SHA256(seed);for(const ch of hsh)bits+=parseInt(ch,16).toString(2).padStart(4,"0");seed=hsh;}
  let k=0;
  const inBox=(r,c,R,C)=>(r>=R&&r<R+7&&c>=C&&c<C+7);
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){
    if(inBox(r,c,0,0)||inBox(r,c,0,n-7)||inBox(r,c,n-7,0)){
      let R0=0,C0=0;if(inBox(r,c,0,n-7)){C0=n-7;}else if(inBox(r,c,n-7,0)){R0=n-7;}
      const rr=r-R0,cc=c-C0,ring=(rr===0||rr===6||cc===0||cc===6),inner=(rr>=2&&rr<=4&&cc>=2&&cc<=4);
      if(ring||inner)ctx.fillRect(c*m,r*m,m,m);continue;
    }
    if(bits[k++]==="1")ctx.fillRect(c*m,r*m,m,m);
  }
}

function render(){
  _after=[];
  const hash=location.hash.replace(/^#/,"")||"/";
  const parts=hash.split("/").filter(Boolean);
  let view="";
  try{
    switch(parts[0]){
      case undefined: view=viewLanding(); break;
      case "internships": view=parts[1]?viewInternshipDetail(parts[1]):viewInternships(); break;
      case "verify": view=parts[1]?viewVerifyResult(decodeURIComponent(parts.slice(1).join("/"))):viewVerify(); break;
      case "login": view=viewAuth("login"); break;
      case "register": view=viewAuth("register"); break;
      case "dashboard": view=viewStudentDashboard(); break;
      case "workspace": view=viewWorkspace(parts[1]); break;
      case "certificates": view=viewCertificates(); break;
      case "profile": view=viewProfile(); break;
      case "org": view=viewOrg(); break;
      case "admin": view=viewAdmin(); break;
      case "leaderboard": view=viewLeaderboard(); break;
      default: view=view404();
    }
  }catch(e){view=`<div class="container block"><div class="card pad"><h2>Something went wrong</h2><p class="muted mt8">${esc(e.message)}</p></div></div>`;}
  $("#app").innerHTML=layout(view);
  closeModal();
  _after.forEach(fn=>{try{fn();}catch(e){console.error(e);}});
  window.scrollTo(0,0);
}

function viewVerifyResult(identifier){
  const r=Certs.verify(identifier,identifier.startsWith("INF-")?"ID":"LINK");
  const copy={OK:"This certificate is authentic and was issued by Infinity Interns.",
    NOT_FOUND:"No certificate matches this identifier. Please check and try again.",
    REVOKED:"This certificate has been revoked by the issuing administrator.",
    TAMPERED:"Integrity check failed — the certificate data does not match its secure hash."};
  const icon=r.valid?"✅":r.reason==="TAMPERED"?"⚠️":"❌";
  const c=r.cert;
  if(c)afterRender(()=>{const cv=$("#vqr");if(cv)drawQR(cv,"https://infinityinterns.com/verify/"+c.certificateId+"|"+c.contentHash);});
  const fields=c?[["Certificate ID",c.certificateId,true],["Awarded to",c.studentName],["Title",c.title],
    ["Organization",c.organizationName],["Domain",c.domainName],["Grade",c.grade?titleCase(c.grade):"—"],
    ["Duration",c.durationWeeks?c.durationWeeks+" weeks":"—"],["Issued on",fmtDate(c.issueDate)],
    ["Verification #",c.verificationNumber,true],["Content hash",c.contentHash.slice(0,32)+"…",true]]:[];
  return `<div class="container block center" style="display:flex;flex-direction:column;align-items:center">
    <div class="card pad" style="max-width:560px;width:100%;text-align:center">
      <div style="font-size:60px">${icon}</div>
      <h1 class="mt8" style="font-size:26px">${r.valid?"Verified Certificate":"Verification Failed"}</h1>
      <p class="muted mt8" style="max-width:360px;margin-inline:auto;font-size:14px">${copy[r.reason]}</p>
      <span class="badge ${r.valid?"success":"danger"} mt16">${r.reason}</span>
      ${c?`<div class="mt24" style="text-align:left">${fields.map(([l,v,m])=>`<div class="flex between" style="padding:7px 0;border-bottom:1px solid var(--border)"><span class="muted" style="font-size:13px">${l}</span><span class="${m?"mono":""}" style="font-size:13px;font-weight:600;text-align:right">${esc(v)}</span></div>`).join("")}
        <div class="center mt16"><canvas class="qr" width="174" height="174" id="vqr"></canvas><div class="muted mt8" style="font-size:11px">Scan/verify code</div></div></div>`:""}
      <div class="mt24"><a class="btn outline" href="#/verify">Verify another</a></div>
    </div>
  </div>`;
}

/* ============================================================================
   TRANSITION HELPER
   ========================================================================== */
function allowedNext(app,actor){
  const isAdmin=actor.roles.includes("ADMIN");
  const ins=Store.internship(app.internshipId);
  const isOrg=actor.orgId&&ins&&ins.orgId===actor.orgId;
  return Workflow.next(app.status).filter(to=>{
    if(to==="WITHDRAWN")return false;
    if(["ADMIN_REVIEW","ORG_REVIEW","COMPLETED"].includes(to))return isAdmin;
    if(["SHORTLISTED","UNDER_REVIEW","SELECTED","ONGOING","PERFORMANCE_EVALUATION","COMPLETION_APPROVAL","REJECTED"].includes(to))return isOrg||isAdmin;
    return isAdmin;
  });
}
function transitionButtons(app,actor){
  const next=allowedNext(app,actor).filter(t=>!(actor.roles.includes("ORGANIZATION")&&t==="COMPLETION_APPROVAL"&&app.status==="PERFORMANCE_EVALUATION"));
  return next.map(to=>`<button class="btn sm ${to==="REJECTED"?"danger":to==="SELECTED"?"success":"outline"}" data-act="transition" data-id="${app.id}" data-to="${to}">${titleCase(to)}</button>`).join(" ");
}

      ${D.certificates.slice().reverse().map(c=>`<tr><td class="mono" style="font-size:12px">${c.certificateId}</td><td>${esc(c.studentName)}</td><td class="muted">${esc(c.title)}</td>

  return `<div class="container block" style="padding-top:28px">

/* ============================================================================
   EVENT DELEGATION
   ========================================================================== */
function closeDropdowns(){$$(".dropdown").forEach(d=>d.classList.add("hidden"));}

document.addEventListener("click",(e)=>{
  // close dropdowns when clicking outside the header widgets
  if(!e.target.closest(".notif-wrap"))closeDropdowns();
  const el=e.target.closest("[data-act]");
  if(!el)return;
  const act=el.dataset.act, id=el.dataset.id, u=Session.current;
  const need=(role)=>{if(!u){toast("Please log in first","warn");navigate("/login");return false;}if(role&&!u.roles.includes(role)){toast("Wrong account type","error");return false;}return true;};
  e.preventDefault();
  try{
  switch(act){
    case "theme":{const t=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",t);localStorage.setItem("ii_theme",t);renderHeaderBits();break;}
    case "toggle-notif":{const dd=$("#notif-dd");const open=dd.classList.contains("hidden");closeDropdowns();if(open){dd.innerHTML=notifDropdown();dd.classList.remove("hidden");}break;}
    case "toggle-user":{const dd=$("#user-dd");const open=dd.classList.contains("hidden");closeDropdowns();if(open)dd.classList.remove("hidden");break;}
    case "read-all":{myNotifs().forEach(n=>n.read=true);Store.save();renderHeaderBits();const dd=$("#notif-dd");if(dd){dd.innerHTML=notifDropdown();dd.classList.remove("hidden");}break;}
    case "read-notif":{const n=Store.data.notifications.find(x=>x.id===el.dataset.id);if(n){n.read=true;Store.save();}closeDropdowns();if(n&&n.link)navigate(n.link.replace(/^#/,""));else renderHeaderBits();break;}
    case "logout":Auth.logout();toast("Logged out");break;
    case "modal-backdrop":if(e.target===el)closeModal();break;
    case "close-modal":closeModal();break;
    case "auth-role":authRole=el.dataset.role;render();break;
    case "filter-branch":catalogFilters={q:"",domain:"",branch:el.dataset.slug,workMode:""};navigate("/internships");break;
    case "filter-domain":catalogFilters={q:"",domain:el.dataset.slug,branch:"",workMode:""};navigate("/internships");break;
    case "set-domain":catalogFilters.domain=el.dataset.slug;render();break;
    case "set-branch":catalogFilters.branch=el.dataset.slug;render();break;
    case "clear-filters":catalogFilters={q:"",domain:"",branch:"",workMode:""};render();break;
    case "apply":applyModal(el.dataset.slug);break;
    case "org-tab":orgTab=el.dataset.tab;render();break;
    case "admin-tab":adminTab=el.dataset.tab;render();break;
    case "assessment":assessmentModal();break;
    case "add-task":taskModal(id);break;
    case "add-report":reportModal(id);break;
    case "mark-attendance":attendanceModal(id);break;
    case "add-feedback":feedbackModal(id);break;
    case "evaluate":evaluateModal(id);break;
    case "manual-cert":manualCertModal();break;
    case "print-cert":printCert(id);break;
    case "review-task":{const a=Store.application(el.dataset.app);const t=a.tasks.find(x=>x.id===el.dataset.task);t.status=el.dataset.status;t.reviewedAt=nowISO();if(t.status==="APPROVED"){t.score=t.score||90;const stu=Store.student(a.studentId);Gamify.badge(stu,"task-master");}Store.save();toast("Task "+titleCase(t.status));render();break;}
    case "transition":{Workflow.transition(id,el.dataset.to,u,el.dataset.to==="REJECTED"?(prompt("Reason for rejection?")||""):"");toast("Moved to "+titleCase(el.dataset.to));render();break;}
    case "ins-submit":{const i=Store.internship(id);i.status="PENDING_APPROVAL";Store.save();toast("Submitted for admin approval");render();break;}
    case "ins-close":{const i=Store.internship(id);i.status="CLOSED";Store.save();toast("Internship closed");render();break;}
    case "ins-approve":{const i=Store.internship(id);i.status="OPEN";i.approvedAt=nowISO();Store.save();const ou=Store.org(i.orgId);notify(Store.user(ou.userId).id,"Internship approved ✅","“"+i.title+"” is now live.","#/org");toast("Approved & published");render();break;}
    case "ins-reject":{const i=Store.internship(id);i.status="DRAFT";Store.save();toast("Sent back to draft");render();break;}
    case "issue-cert":{const c=Certs.issueForApplication(id,u.id);toast("Certificate "+c.certificateId+" issued 🏅");render();break;}
    case "bulk-cert":{const done=Store.data.applications.filter(a=>a.status==="COMPLETED");let n=0;done.forEach(a=>{try{Certs.issueForApplication(a.id,u.id);n++;}catch(e){}});toast(n+" certificate(s) issued");render();break;}
    case "revoke-cert":{Certs.revoke(id,prompt("Reason for revocation?")||"Revoked by admin");toast("Certificate revoked");render();break;}
    case "tamper-cert":{Certs.simulateTamper(id);toast("Field edited WITHOUT updating hash — try verifying it now","warn");render();break;}
    case "set-status":{const usr=Store.user(id);usr.status=el.dataset.status;Store.save();toast("User "+el.dataset.status.toLowerCase());render();break;}
    case "reset-demo":{if(confirm("Reset all demo data?")){Store.reset();Session.clear();toast("Demo reset");navigate("/");render();}break;}
  }
  }catch(err){toast(err.message,"error");}
});

/* ---- form submissions ---- */
document.addEventListener("submit",(e)=>{
  const form=e.target;const fname=form.dataset.form;if(!fname)return;
  e.preventDefault();
  const data=Object.fromEntries(new FormData(form).entries());
  const u=Session.current;
  try{
  switch(fname){
    case "login":{const usr=Auth.login(data.email,data.password);toast("Welcome back, "+usr.fullName.split(" ")[0]);navigate(usr.roles.includes("ADMIN")?"/admin":usr.roles.includes("ORGANIZATION")?"/org":"/dashboard");break;}
    case "register":{const usr=Auth.register(data);toast("Account created 🎉");navigate(usr.roles.includes("ORGANIZATION")?"/org":"/dashboard");break;}
    case "search":{catalogFilters.q=data.q||"";catalogFilters.workMode=data.workMode||"";render();break;}
    case "verify":{if(data.identifier&&data.identifier.trim())navigate("/verify/"+encodeURIComponent(data.identifier.trim()));break;}
    case "apply":{
      const i=Store.internshipBySlug(data.slug);const stu=Store.student(u.studentId);
      if(Store.data.applications.find(a=>a.studentId===stu.id&&a.internshipId===i.id))throw new Error("Already applied");
      const app={id:uid("app"),studentId:stu.id,internshipId:i.id,status:"APPLIED",coverLetter:data.coverLetter||"",
        resumeUrl:data.resumeUrl||stu.resumeUrl,githubUrl:data.githubUrl||stu.githubUrl,appliedAt:nowISO(),
        history:[{from:null,to:"APPLIED",actorId:u.id,at:nowISO()}],tasks:[],attendance:[],reports:[],feedback:[]};
      Store.data.applications.push(app);Gamify.add(stu,25);Gamify.badge(stu,"first-application");Store.save();
      const ou=Store.org(i.orgId);notify(Store.user(ou.userId).id,"New applicant","Someone applied to “"+i.title+"”.","#/org");
      closeModal();toast("Application submitted! ⚡");navigate("/dashboard");break;}
    case "profile":{const stu=Store.student(u.studentId);Object.assign(stu,{branch:data.branch,college:data.college,
      gradYear:data.gradYear?+data.gradYear:null,cgpa:data.cgpa?+data.cgpa:null,city:data.city,bio:data.bio,
      resumeUrl:data.resumeUrl,githubUrl:data.githubUrl,linkedinUrl:data.linkedinUrl,
      skills:(data.skills||"").split(",").map(s=>s.trim()).filter(Boolean)});
      stu.profileCompletion=computeCompletion(stu);Store.save();toast("Profile saved");navigate("/dashboard");break;}
    case "post-internship":{const org=Store.org(u.orgId);const ins={id:uid("int"),
      slug:data.title.toLowerCase().replace(/[^a-z0-9]+/g,"-")+"-"+Math.random().toString(36).slice(2,6),
      title:data.title,description:data.description,responsibilities:data.responsibilities||"",eligibility:data.eligibility||"",
      orgId:org.id,domain:data.domain,branch:data.branch||"",workMode:data.workMode,stipendMin:+data.stipendMin||null,
      stipendMax:+data.stipendMax||null,durationWeeks:+data.durationWeeks||8,openings:+data.openings||1,status:"DRAFT",views:0,createdAt:nowISO()};
      Store.data.internships.push(ins);Store.save();orgTab="listings";toast("Internship created as draft");render();break;}
    case "task":{const a=Store.application(data.appId);a.tasks=a.tasks||[];a.tasks.push({id:uid("tsk"),title:data.title,description:data.description,submissionUrl:data.submissionUrl,weekNumber:+data.weekNumber||1,status:"SUBMITTED",submittedAt:nowISO()});Store.save();closeModal();toast("Task submitted");render();break;}
    case "report":{const a=Store.application(data.appId);a.reports=a.reports||[];const wk=+data.weekNumber||1;const ex=a.reports.find(r=>r.weekNumber===wk);if(ex){Object.assign(ex,{summary:data.summary,hoursLogged:+data.hoursLogged||0,blockers:data.blockers});}else{a.reports.push({id:uid("rep"),weekNumber:wk,summary:data.summary,hoursLogged:+data.hoursLogged||0,blockers:data.blockers,at:nowISO()});}Store.save();closeModal();toast("Weekly report saved");render();break;}
    case "attendance":{const a=Store.application(data.appId);a.attendance=a.attendance||[];const ex=a.attendance.find(x=>x.date===data.date);if(ex){ex.hours=+data.hours;ex.present=true;}else{a.attendance.push({date:data.date,present:true,hours:+data.hours});}const stu=Store.student(a.studentId);if(a.attendance.filter(x=>x.present).length>=5)Gamify.badge(stu,"perfect-attendance");Store.save();closeModal();toast("Attendance logged");render();break;}
    case "evaluate":{const a=Store.application(data.appId);a.finalGrade=data.grade;a.finalScore=+data.score;Workflow.transition(a.id,"COMPLETION_APPROVAL",u,"Graded "+titleCase(data.grade)+" ("+data.score+"/100)"+(data.note?" — "+data.note:""));closeModal();toast("Evaluated → awaiting admin completion");render();break;}
    case "feedback":{const a=Store.application(data.appId);a.feedback=a.feedback||[];a.feedback.push({id:uid("fb"),rating:+data.rating,comment:data.comment,at:nowISO()});Store.save();closeModal();toast("Feedback sent");render();break;}
    case "manual-cert":{const stu=Store.student(data.studentId);const su=Store.user(stu.userId);const c=Certs.issue({type:data.type,studentId:stu.id,studentName:su.fullName,organizationName:data.organizationName,domainName:data.domainName,title:data.title,issuedBy:u.id});notify(su.id,"Certificate issued 🏅","You received: "+c.title,"#/certificates");closeModal();toast("Certificate "+c.certificateId+" issued");render();break;}
    case "assessment":{let correct=0;QUIZ.forEach((q,i)=>{if(+data["q"+i]===q.c)correct++;});const score=Math.round(correct/QUIZ.length*100);const pass=score>=60;if(u&&u.studentId&&pass)Gamify.add(Store.student(u.studentId),80);closeModal();toast("You scored "+score+"% "+(pass?"— +80 XP! 🎉":"— keep practicing"),pass?"success":"warn");render();break;}
  }
  }catch(err){toast(err.message,"error");}
});

/* ============================================================================
   INIT
   ========================================================================== */
(function init(){
  const t=localStorage.getItem("ii_theme");if(t)document.documentElement.setAttribute("data-theme",t);
  Store.load();Session.load();
  window.addEventListener("hashchange",render);
  render();
})();
</script>
